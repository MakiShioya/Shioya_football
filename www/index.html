<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shioya Football</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Shioya Football</h1>
        <!-- リーグ切り替えメニューを追加 -->
        <div style="margin: 15px; text-align: center;">
            <select id="league-filter" style="padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 1rem; width: 90%; max-width: 400px; background-color: #f8f9fa;">
                <option value="all">すべての注目試合</option>
                <optgroup label="5大リーグ 1部">
                    <option value="premier_league">プレミアリーグ (英)</option>
                    <option value="laliga">ラ・リーガ (西)</option>
                    <option value="bundesliga">ブンデスリーガ (独)</option>
                    <option value="serie_a">セリエA (伊)</option>
                    <option value="ligue_1">リーグ・アン (仏)</option>
                </optgroup>
                <optgroup label="5大リーグ 2部">
                    <option value="championship">チャンピオンシップ (英2部)</option>
                    <option value="laliga2">ラ・リーガ2 (西2部)</option>
                    <option value="bundesliga2">2. ブンデスリーガ (独2部)</option>
                    <option value="serie_b">セリエB (伊2部)</option>
                    <option value="ligue_2">リーグ・アン2 (仏2部)</option>
                </optgroup>
                <optgroup label="欧州その他 & アジア">
                    <option value="belgium">ベルギー・リーグ</option>
                    <option value="portugal">プリメイラ・リーガ (葡)</option>
                    <option value="netherlands">エールディヴィジ (蘭)</option>
                    <option value="j_league">J1リーグ</option>
                </optgroup>
            </select>
        </div>
    </header>

    <main id="match-list">
        <p style="text-align: center; color: #666; margin-top: 20px;">試合情報を読み込み中...</p>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
